# Server-wide security headers for Brain Arena.
#
# Goes into /etc/nginx/conf.d/ (not sites-enabled) so it applies to
# every server block. nginx loads conf.d/*.conf at the http level.
#
# Install (one-time, done by scripts/setup-https.sh):
#   sudo cp scripts/nginx-brain-arena-headers.conf \
#     /etc/nginx/conf.d/brain-arena-headers.conf
#   sudo nginx -t && sudo systemctl reload nginx

# HSTS — tell browsers to use HTTPS for this domain for the next year.
# `includeSubDomains` covers any future subdomains. `preload` opts into
# the HSTS preload list (you must submit at https://hstspreload.org/
# separately if you want to be in the browser-bundled list).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# X-Content-Type-Options: prevent MIME sniffing on stylesheets/scripts.
add_header X-Content-Type-Options "nosniff" always;

# Referrer-Policy: don't leak full URLs to third-party sites on
# outbound clicks. strict-origin-when-cross-origin keeps the origin
# only on cross-site, full URL on same-site.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy: explicitly disable browser features the app
# doesn't use, so a future XSS can't enable them.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# Frame-Options: don't allow this site in iframes (clickjacking).
add_header X-Frame-Options "SAMEORIGIN" always;

# CSP is intentionally NOT set globally — Next.js's inline runtime
# scripts make a strict CSP non-trivial without nonces. Add later
# once we adopt a nonce strategy.
