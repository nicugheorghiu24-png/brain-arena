# nginx site config for Brain Arena (origin TLS termination via Let's
# Encrypt). Run `scripts/setup-https.sh` to install certbot + this
# config + initial cert. After that, nginx reloads and certbot's timer
# auto-renews.
#
# This config:
#   - listens on 80 and redirects everything to https
#   - listens on 443 with the certbot-issued cert
#   - proxies HTTP and Socket.IO websockets to 127.0.0.1:3000
#   - sets X-Forwarded-{For,Proto,Host} so Next.js and Socket.IO see
#     the real client and protocol
#
# certbot's nginx plugin will edit this file in place to add cert paths;
# the listen-443 / ssl_* lines you see below are placeholders that get
# overwritten by `certbot --nginx -d playbrainarena.com`.

server {
    listen 80;
    listen [::]:80;
    server_name playbrainarena.com www.playbrainarena.com;

    # ACME http-01 challenge: served from the well-known path; everything
    # else 301s to https.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name playbrainarena.com www.playbrainarena.com;

    # certbot --nginx will replace the next two lines with real paths.
    ssl_certificate     /etc/letsencrypt/live/playbrainarena.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playbrainarena.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Modest hardening; expand later if needed.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Standard forwards so the Node process sees the real client +
        # the real (HTTPS) scheme. Next.js and Socket.IO both honor
        # X-Forwarded-Proto.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Socket.IO uses the same path; these headers upgrade the
        # connection cleanly.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Long-poll fallback + keepalive for the websocket need patient
        # timeouts. 1 hour is plenty for the chess gameplay envelope.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
