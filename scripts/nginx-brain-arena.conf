# nginx site config for Brain Arena.
#
# This file is intentionally HTTP-only. After `scripts/setup-https.sh`
# runs `certbot --nginx --redirect -d playbrainarena.com -d www…`,
# certbot edits THIS FILE in-place to:
#   - add a `listen 443 ssl http2;` server block with cert paths and
#     SSL protocol settings
#   - add `include /etc/letsencrypt/options-ssl-nginx.conf;` and
#     `ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;`
#   - replace the port-80 `location /` block with a `return 301 https://`
#
# So the file will look much bigger after first install. That's fine.
# Don't put the TLS bits in pre-emptively — they reference paths that
# don't exist until certbot has run at least once.
#
# Security headers (Strict-Transport-Security in particular) are
# defined in /etc/nginx/conf.d/brain-arena-headers.conf — see
# scripts/setup-https.sh which installs both.

server {
    listen 80;
    listen [::]:80;
    server_name playbrainarena.com www.playbrainarena.com;

    # ACME http-01 challenge served from the well-known path. certbot
    # uses this on renewal too.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Tell the Node app the real client + scheme. After certbot
        # --redirect runs, $scheme will be "https" for incoming HTTPS
        # requests, which is what the cookie-secure logic and the
        # Socket.IO CORS list both need.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Socket.IO websocket upgrade.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Long-poll fallback + chess clocks need patient timeouts.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        client_max_body_size 2m;
    }
}
